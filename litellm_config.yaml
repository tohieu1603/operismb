router_settings:
  routing_strategy: "simple-shuffle"
  num_retries: 2
  timeout: 300
  fallbacks:
    # operis-multi lỗi → fallback gpt-oss → deepseek-v3.2
    - operis-multi: ["gpt-oss-120b", "deepseek-v3.2"]

litellm_settings:
  drop_params: true
  set_verbose: false

general_settings:
  master_key: "sk-litellm-master-operis-2026"
