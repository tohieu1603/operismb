model_list:
  # === operis-multi: primary model with fallback ===
  - model_name: "operis-multi"
    litellm_params:
      model: "openai/kimi-k2.5"
      api_base: "https://ark.ap-southeast.bytepluses.com/api/coding/v3"
      api_key: "os.environ/BYTEPLUS_API_KEY"

  # === Individual models ===
  - model_name: "kimi-k2.5"
    litellm_params:
      model: "openai/kimi-k2.5"
      api_base: "https://ark.ap-southeast.bytepluses.com/api/coding/v3"
      api_key: "os.environ/BYTEPLUS_API_KEY"

  - model_name: "gpt-oss-120b"
    litellm_params:
